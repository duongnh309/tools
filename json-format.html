<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Formatter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #d9bcf5 100%);
            min-height: 100vh;
            display: flex;
            align-items: stretch;
            justify-content: center;
            padding: 10px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 95%;
            max-width: 1600px;
            padding: 30px;
            display: flex;
            flex-direction: column;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            font-size: 2.2em;
        }
        
        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .panel {
            display: flex;
            flex-direction: column;
        }
        
        .panel label {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 0.95em;
        }
        
        textarea {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            min-height: 500px;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        #output-display {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            min-height: 500px;
            background: white;
            overflow: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            word-break: break-word;
            line-height: 1.5;
        }
        
        .tree-toggle {
            cursor: pointer;
            display: inline-block;
            width: 20px;
            text-align: center;
            user-select: none;
            color: #666;
            font-weight: bold;
        }
        
        .tree-toggle:hover {
            color: #333;
        }
        
        .tree-content {
            display: inline-block;
        }
        
        .tree-content.collapsed {
            color: #999;
        }
        
        .tree-children {
            margin-left: 20px;
        }
        
        .tree-children.hidden {
            display: none;
        }
        
        .textarea-error {
            border-color: #ff6b6b !important;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .btn-danger {
            background: #ff6b6b;
            color: white;
        }
        
        .btn-danger:hover {
            background: #ee5a5a;
        }
        
        .message {
            padding: 15px;
            border-radius: 8px;
            font-weight: 500;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 400px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .message.visible {
            opacity: 1;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .options {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .option {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .option input[type="number"] {
            width: 60px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        
        .option label {
            margin: 0;
        }
        
        .option input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }
        
        @media (max-width: 768px) {
            .content {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 The Best JSON Formatter By Phát Mập Địt</h1>
        
        <div id="message" class="message"></div>
        
        <div class="options">
            <div class="option">
                <label for="indent">Indent Spaces:</label>
                <input type="number" id="indent" min="1" max="8" value="2">
            </div>
            <div class="option">
                <input type="checkbox" id="sort" checked>
                <label for="sort">Sort Keys</label>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn-primary" onclick="formatJSON()">Format JSON</button>
            <button class="btn-secondary" onclick="minifyJSON()">Minify</button>
            <button class="btn-secondary" onclick="copyOutput()">Copy Output</button>
            <button class="btn-danger" onclick="clearAll()">Clear All</button>
        </div>
        
        <div class="content">
            <div class="panel">
                <label for="input">Input JSON:</label>
                <textarea id="input" placeholder="Paste your JSON here..."></textarea>
            </div>
            <div class="panel">
                <label for="output">Formatted JSON:</label>
                <div id="output-display"></div>
            </div>
        </div>
    </div>
    
    <script>
        let rawOutput = '';
        
        function createTreeView(obj, isRoot = false) {
            if (obj === null) {
                return '<span style="color: #6f42c1; font-weight: 600;">null</span>';
            }
            
            if (typeof obj === 'boolean') {
                return `<span style="color: #d73a49; font-weight: 600;">${obj}</span>`;
            }
            
            if (typeof obj === 'number') {
                return `<span style="color: #005cc5;">${obj}</span>`;
            }
            
            if (typeof obj === 'string') {
                return `<span style="color: #d73a49;">"${obj}"</span>`;
            }
            
            if (Array.isArray(obj)) {
                if (obj.length === 0) {
                    return '<span style="color: #666;">[]</span>';
                }
                
                let html = '<span style="color: #666;">[</span>';
                html += '<div class="tree-children">';
                obj.forEach((item, index) => {
                    const hasChildren = (typeof item === 'object' && item !== null);
                    const toggleHtml = hasChildren ? `<span class="tree-toggle" onclick="toggleNode(event)">▼</span>` : '<span class="tree-toggle"></span>';
                    const childContent = createTreeView(item, false);
                    const comma = index < obj.length - 1 ? ',' : '';
                    html += `<div>${toggleHtml}<span class="tree-content">${childContent}</span><span style="color: #666;">${comma}</span></div>`;
                });
                html += '</div>';
                html += '<span style="color: #666;">]</span>';
                return html;
            }
            
            if (typeof obj === 'object') {
                const keys = Object.keys(obj);
                if (keys.length === 0) {
                    return '<span style="color: #666;">{}</span>';
                }
                
                let html = '<span style="color: #666;">{</span>';
                html += '<div class="tree-children">';
                keys.forEach((key, index) => {
                    const value = obj[key];
                    const hasChildren = (typeof value === 'object' && value !== null);
                    const toggleHtml = hasChildren ? `<span class="tree-toggle" onclick="toggleNode(event)">▼</span>` : '<span class="tree-toggle"></span>';
                    const keyHtml = `<span style="color: #881391; font-weight: 600;">"${key}"</span>`;
                    const valueHtml = createTreeView(value, false);
                    const comma = index < keys.length - 1 ? ',' : '';
                    html += `<div>${toggleHtml}<span class="tree-content">${keyHtml}: ${valueHtml}</span><span style="color: #666;">${comma}</span></div>`;
                });
                html += '</div>';
                html += '<span style="color: #666;">}</span>';
                return html;
            }
        }
        
        function toggleNode(event) {
            const toggle = event.target;
            const parent = toggle.parentElement;
            const children = parent.querySelector('.tree-children');
            const content = parent.querySelector('.tree-content');
            
            if (children) {
                children.classList.toggle('hidden');
                toggle.textContent = children.classList.contains('hidden') ? '▶' : '▼';
                content.classList.toggle('collapsed');
            }
        }
        
        function showMessage(text, type) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = text;
            msgEl.className = `message visible ${type}`;
            setTimeout(() => {
                msgEl.classList.remove('visible');
            }, 3000);
        }
        
        function formatJSON() {
            const input = document.getElementById('input');
            const output = document.getElementById('output-display');
            const indent = parseInt(document.getElementById('indent').value);
            const sort = document.getElementById('sort').checked;
            
            try {
                input.classList.remove('textarea-error');
                const json = JSON.parse(input.value);
                const sorted = sort ? sortObjectKeys(json) : json;
                rawOutput = JSON.stringify(sorted, null, indent);
                output.innerHTML = createTreeView(sorted, true);
                showMessage('JSON formatted successfully!', 'success');
            } catch (error) {
                input.classList.add('textarea-error');
                showMessage(`Error: ${error.message}`, 'error');
            }
        }
        
        function fixJSON() {
            const input = document.getElementById('input');
            let text = input.value;
            
            try {
                // Try to parse first
                JSON.parse(text);
                showMessage('JSON is already valid!', 'success');
                return;
            } catch (e) {
                // Try to fix common issues
                text = fixUnescapedQuotes(text);
                
                try {
                    JSON.parse(text);
                    input.value = text;
                    input.classList.remove('textarea-error');
                    showMessage('JSON fixed and formatted!', 'success');
                    setTimeout(formatJSON, 100);
                } catch (error) {
                    input.classList.add('textarea-error');
                    showMessage(`Still invalid: ${error.message}`, 'error');
                }
            }
        }
        
        function fixUnescapedQuotes(jsonStr) {
            // Intelligent fix: scan through and fix unescaped quotes in string values
            let result = '';
            let i = 0;
            
            while (i < jsonStr.length) {
                let char = jsonStr[i];
                
                if (char === '"') {
                    // Start of a string value
                    result += char;
                    i++;
                    
                    // Read until closing quote
                    while (i < jsonStr.length) {
                        char = jsonStr[i];
                        
                        if (char === '\\' && i + 1 < jsonStr.length) {
                            // Escape sequence - keep both characters
                            result += char + jsonStr[i + 1];
                            i += 2;
                        } else if (char === '"') {
                            // Check if this might be closing quote or content
                            let nextPos = i + 1;
                            let nextChar = nextPos < jsonStr.length ? jsonStr[nextPos] : '';
                            
                            // Skip whitespace to find next meaningful character
                            while (nextPos < jsonStr.length && /\s/.test(jsonStr[nextPos])) {
                                nextPos++;
                            }
                            nextChar = nextPos < jsonStr.length ? jsonStr[nextPos] : '';
                            
                            // If followed by :, }, ], or comma, it's closing quote; otherwise escape it
                            if (nextChar === ':' || nextChar === '}' || nextChar === ']' || nextChar === ',' || nextChar === '') {
                                result += char;
                                i++;
                                break;
                            } else {
                                // Unescaped quote inside string - escape it
                                result += '\\"';
                                i++;
                            }
                        } else {
                            result += char;
                            i++;
                        }
                    }
                } else {
                    result += char;
                    i++;
                }
            }
            
            return result;
        }
        
        function minifyJSON() {
            const input = document.getElementById('input');
            const output = document.getElementById('output-display');
            
            try {
                input.classList.remove('textarea-error');
                const json = JSON.parse(input.value);
                rawOutput = JSON.stringify(json);
                output.innerHTML = createTreeView(json, true);
                showMessage('JSON minified successfully!', 'success');
            } catch (error) {
                input.classList.add('textarea-error');
                showMessage(`Error: ${error.message}`, 'error');
            }
        }
        
        function sortObjectKeys(obj) {
            if (Array.isArray(obj)) {
                return obj.map(sortObjectKeys);
            } else if (obj !== null && typeof obj === 'object') {
                return Object.keys(obj)
                    .sort()
                    .reduce((result, key) => {
                        result[key] = sortObjectKeys(obj[key]);
                        return result;
                    }, {});
            }
            return obj;
        }
        
        function copyOutput() {
            if (!rawOutput) {
                showMessage('Nothing to copy!', 'error');
                return;
            }
            navigator.clipboard.writeText(rawOutput).then(() => {
                showMessage('Copied to clipboard!', 'success');
            }).catch(() => {
                showMessage('Failed to copy!', 'error');
            });
        }
        
        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output-display').innerHTML = '';
            document.getElementById('input').classList.remove('textarea-error');
            rawOutput = '';
            showMessage('Cleared!', 'success');
        }
        
        // Format on Enter (Ctrl+Enter)
        document.getElementById('input').addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                formatJSON();
            }
        });
        
        // Auto-format on paste
        document.getElementById('input').addEventListener('paste', () => {
            setTimeout(() => {
                const input = document.getElementById('input');
                let text = input.value;
                
                try {
                    // Try to parse first
                    JSON.parse(text);
                    // If valid, just format it
                    formatJSON();
                } catch (e) {
                    // If invalid, try to fix it
                    text = fixUnescapedQuotes(text);
                    input.value = text;
                    
                    try {
                        JSON.parse(text);
                        input.classList.remove('textarea-error');
                        formatJSON();
                        showMessage('JSON auto-fixed and formatted!', 'success');
                    } catch (error) {
                        input.classList.add('textarea-error');
                        showMessage(`Paste error - click Fix JSON: ${error.message}`, 'error');
                    }
                }
            }, 10);
        });
    </script>
</body>
</html>
